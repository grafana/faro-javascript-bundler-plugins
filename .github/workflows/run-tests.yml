name: run-tests
on:
  pull_request:

jobs:
  run-tests:
    name: Testing with Node version (${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x, 25.x, 26.x]
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Secret scan
        # Scans first-party source folders (packages, development) to avoid
        # noisy false positives from node_modules and .yarn/cache. TruffleHog
        # flags minified webpack chunks as unverified Sentry DSN-style tokens;
        # we do not ship Sentry auth tokens, so SentryToken is excluded.
        # Runs before install/build to fail fast.
        uses: ./.github/actions/secret-scan

      - name: Enable corepack
        run: corepack enable

      - name: Setup NPM
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: ${{ matrix.node }}
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: |
          yarn build
          # Retry tests 3 times
          yarn test || yarn test || yarn test

      - name: Build production bundle
        run: yarn build
