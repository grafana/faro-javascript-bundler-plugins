compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules
enableScripts: false

# `@grafana/ui` ships `react-data-grid` as a Git dependency. Yarn 4 hardened mode
# (auto-enabled on PRs) blocks Git fetches unless the repository is allow-listed,
# which breaks dependency bumps that change the pinned commit.
approvedGitRepositories:
  - 'https://github.com/grafana/react-data-grid*'
  - 'ssh://git@github.com/grafana/react-data-grid*'

npmScopes:
  grafana-cloud:
    npmAlwaysAuth: true
    npmAuthToken: '${GCLOUD_TOKEN:-}'
    npmRegistryServer: 'https://us-npm.pkg.dev/grafanalabs-dev/cloud-npm-dev/'
